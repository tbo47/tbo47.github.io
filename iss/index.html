<!DOCTYPE html>
<html>
    <head>
        <title>International Space Station ISS</title>
        <meta property="og:title" content="ISS on a 3d immersive globe." />
        <link rel="icon" href="sat.png" />
        <meta
            property="og:description"
            content="Follow the International Space Station (ISS) trajectory on a globe. Using the openglobus opensource project."
        />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://tbo47.github.io/iss/" />
        <meta property="og:image" content="https://tbo47.github.io/iss/iss_1200_630_2.png" />
        <meta property="og:image:height" content="630" />
        <meta property="og:image:width" content="1200" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css" />
        <link rel="stylesheet" href="og.css" type="text/css" />
        <style>
            body {
                margin: 0;
                padding: 0;
                width: 100vw;
                height: 100vh;
            }
            .og-coordinates {
                visibility: hidden;
            }
            .hidden {
                visibility: hidden;
                opacity: 0;
                transition: visibility 0s 4s, opacity 4s linear;
            }
            .og-attribution {
                display: none;
            }
        </style>
        <script src="og.umd.js"></script>
    </head>
    <body>
        <div class="field" style="position: absolute; padding: 1rem; z-index: 10">
            <a class="button is-link is-light" href="../" title="About the author">?</a>
            <button
                class="button is-link is-light"
                onclick="centerButtonOnClick()"
                title="Center the globe on the satellite"
            >
                Center
            </button>
            <button class="button is-light" id="rotate-the-globe-info">
                Use the Alt key and the mouse to rotate the globe.
            </button>

                <span class="icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M8 3H5a2 2 0 0 0-2 2v3" />
